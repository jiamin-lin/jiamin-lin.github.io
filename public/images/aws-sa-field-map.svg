<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Cloud architecture field map</title>
  <desc id="desc">A neutral reference architecture map showing edge, identity, API, compute, data, and observability layers.</desc>
  <rect width="760" height="520" fill="#f9fbf8"/>
  <rect x="34" y="34" width="692" height="452" rx="8" fill="#ffffff" stroke="#dfe5df"/>
  <text x="62" y="78" fill="#151a1e" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Reference Architecture Map</text>
  <text x="62" y="108" fill="#5d6670" font-family="Inter, Arial, sans-serif" font-size="15">Edge, identity, API, compute, data, and observability flow</text>

  <g font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">
    <rect x="62" y="154" width="132" height="72" rx="8" fill="#eef3f1" stroke="#cfd9d2"/>
    <text x="91" y="185" fill="#151a1e">Users</text>
    <text x="86" y="207" fill="#5d6670" font-size="12">web / mobile</text>

    <rect x="244" y="154" width="132" height="72" rx="8" fill="#fff3eb" stroke="#eccab7"/>
    <text x="277" y="185" fill="#151a1e">Edge</text>
    <text x="268" y="207" fill="#5d6670" font-size="12">cdn / waf</text>

    <rect x="426" y="154" width="132" height="72" rx="8" fill="#eef6f6" stroke="#bfdedb"/>
    <text x="454" y="185" fill="#151a1e">Identity</text>
    <text x="447" y="207" fill="#5d6670" font-size="12">auth / policy</text>

    <rect x="244" y="280" width="132" height="72" rx="8" fill="#f1f5f8" stroke="#c7d6e3"/>
    <text x="286" y="311" fill="#151a1e">API</text>
    <text x="267" y="333" fill="#5d6670" font-size="12">gateway / events</text>

    <rect x="426" y="280" width="132" height="72" rx="8" fill="#eef3f1" stroke="#cfd9d2"/>
    <text x="455" y="311" fill="#151a1e">Compute</text>
    <text x="448" y="333" fill="#5d6670" font-size="12">containers / fn</text>

    <rect x="608" y="280" width="88" height="72" rx="8" fill="#fff3eb" stroke="#eccab7"/>
    <text x="623" y="311" fill="#151a1e">Data</text>
    <text x="621" y="333" fill="#5d6670" font-size="12">lake / db</text>

    <rect x="244" y="406" width="452" height="42" rx="8" fill="#151a1e"/>
    <text x="386" y="432" fill="#ffffff">Observability, Cost, Reliability</text>
  </g>

  <g fill="none" stroke="#0f7f7a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M194 190 H244"/>
    <path d="M376 190 H426"/>
    <path d="M310 226 V280"/>
    <path d="M376 316 H426"/>
    <path d="M558 316 H608"/>
    <path d="M492 226 V280"/>
    <path d="M310 352 V406"/>
    <path d="M492 352 V406"/>
    <path d="M652 352 V406"/>
  </g>

  <g fill="#d36b2c">
    <circle cx="194" cy="190" r="5"/>
    <circle cx="376" cy="190" r="5"/>
    <circle cx="310" cy="280" r="5"/>
    <circle cx="426" cy="316" r="5"/>
    <circle cx="608" cy="316" r="5"/>
    <circle cx="492" cy="280" r="5"/>
  </g>
</svg>
