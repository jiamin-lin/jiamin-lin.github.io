title: Drzone
subtitle: Stay hungry
description: Stay hungry
keywords:
  - blog
  - notion
  - i18n
  - hexo
author: Drsee
language:
  - zh-CN
  - en
  - ja
timezone: Asia/Shanghai

url: https://jiamin-lin.github.io
root: /
permalink: :year/:month/:day/:title/
pretty_urls:
  trailing_index: true
  trailing_html: false

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js

index_generator:
  path: ''
  per_page: 10
  order_by: -date
archive_generator:
  per_page: 10
  yearly: true
  monthly: true
tag_generator:
  per_page: 10
category_generator:
  per_page: 10

theme: next

marked:
  prependRoot: true
  postAsset: false
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date

search:
  path: search.xml
  field: post
  content: true
  format: html

symbols_count_time:
  symbols: true
  time: true
  total_symbols: true
  total_time: true

i18n:
  default: zh-cn
  per_page: 10
  languages:
    - code: zh-cn
      locale: zh-CN
      name: 简体中文
    - code: en
      locale: en
      name: English
    - code: ja
      locale: ja
      name: 日本語

metadata:
  notion_source: be1e22c687994c7bbfeb6b787384015e
